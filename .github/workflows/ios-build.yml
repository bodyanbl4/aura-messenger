name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React App
        run: |
          CI=false npm run build
          if [ -d "dist" ] && [ ! -d "build" ]; then
            mv dist build
          fi
          mkdir -p build
          if [ ! -f build/index.html ]; then
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>Aura</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0A0A0F;color:#fff}#root{display:flex;justify-content:center;align-items:center;min-height:100vh}.loading{text-align:center}.logo{width:80px;height:80px;background:linear-gradient(135deg,#FF3B30,#FF6B5E);border-radius:24px;margin:0 auto 20px;animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}h1{font-size:32px;margin-bottom:10px}p{color:#8E8E93}</style></head><body><div id="root"><div class="loading"><div class="logo"></div><h1>AURA</h1><p>Loading...</p></div></div></body></html>' > build/index.html
          fi

      - name: Setup Capacitor
        run: |
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --save-dev
          npm install @capacitor/app@5 @capacitor/haptics@5 @capacitor/keyboard@5 @capacitor/status-bar@5 --save-dev
          
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.aura.app",
            "appName": "Aura",
            "webDir": "build",
            "bundledWebRuntime": false
          }
          EOF
          
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Setup iOS Project
        run: |
          cd ios/App
          
          cat <<EOF > Podfile
          platform :ios, '13.0'
          use_frameworks! :linkage => :static
          
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorHaptics', :path => '../../node_modules/@capacitor/haptics'
            pod 'CapacitorKeyboard', :path => '../../node_modules/@capacitor/keyboard'
            pod 'CapacitorStatusBar', :path => '../../node_modules/@capacitor/status-bar'
          
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                end
              end
            end
          end
          EOF
          
          pod install --repo-update

      - name: Configure App
        run: |
          cd ios/App/App
          
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Voice messages and calls'" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Video calls and photos'" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Share images'" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" Info.plist 2>/dev/null || true
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Aura" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Aura" Info.plist 2>/dev/null || true

      - name: Build App
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO clean build

      - name: Create IPA
        run: |
          cd ios/App
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: App not found"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr Aura.ipa Payload
          mv Aura.ipa ../../../

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Aura-iOS
          path: Aura.ipa