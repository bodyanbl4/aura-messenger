name: Build iOS IPA (Simple)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React App
        run: |
          CI=false npm run build
          if [ -d "dist" ] && [ ! -d "build" ]; then
            mv dist build
          fi
          mkdir -p build
          if [ ! -f build/index.html ]; then 
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aura</title></head><body><div id="root"></div><script>document.getElementById("root").innerHTML="<h1>Aura Messenger</h1>"</script></body></html>' > build/index.html
          fi

      - name: Setup Capacitor (Minimal)
        run: |
          # Только основные пакеты
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --save-dev
          
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.aura.app",
            "appName": "Aura",
            "webDir": "build",
            "bundledWebRuntime": false
          }
          EOF
          
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Create Minimal Podfile
        run: |
          cd ios/App
          
          # Минимальный Podfile без дополнительных плагинов
          cat <<EOF > Podfile
          platform :ios, '13.0'
          use_frameworks! :linkage => :static
          
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          pod install --repo-update

      - name: Build iOS App
        run: |
          cd ios/App
          
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create IPA
        run: |
          cd ios/App
          
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: App not found"
            exit 1
          fi
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr Aura-App.ipa Payload
          mv Aura-App.ipa ../../../

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Aura-iOS
          path: Aura-App.ipa