name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React App
        run: |
          CI=false npm run build
          # Если сборщик создал dist вместо build, переименовываем
          if [ -d "dist" ] && [ ! -d "build" ]; then
            mv dist build
          fi
          # На всякий случай гарантируем, что папка build существует
          mkdir -p build
          if [ ! -f build/index.html ]; then echo "<html><body>Aura</body></html>" > build/index.html; fi

      - name: Fix and Sync Capacitor
        run: |
          # Устанавливаем сам Capacitor и платформу iOS в систему
          npm install @capacitor/cli @capacitor/core @capacitor/ios --save-dev
          
          # Принудительно и жестко создаем правильный конфиг
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.aura.app",
            "appName": "Aura",
            "webDir": "build",
            "bundledWebRuntime": false
          }
          EOF
          
          # Сносим старую сломанную папку ios, если она есть
          rm -rf ios
          
          # Генерируем чистый проект Apple
          npx cap add ios
          npx cap sync ios

      - name: Build Unsigned IPA
        run: |
          cd ios/App
          # Обновляем зависимости Apple
          pod install --repo-update
          
          # Собираем приложение без платных сертификатов
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO clean build
          
          # Упаковываем в IPA
          cd build/Release-iphoneos
          mkdir Payload
          cp -R App.app Payload
          zip -qr Aura-App.ipa Payload

      - name: Upload IPA File
        uses: actions/upload-artifact@v4
        with:
          name: Aura-iOS
          path: ios/App/build/Release-iphoneos/Aura-App.ipa