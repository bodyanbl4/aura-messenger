name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React App
        run: |
          CI=false npm run build
          # Если сборщик создал dist вместо build, переименовываем
          if [ -d "dist" ] && [ ! -d "build" ]; then
            mv dist build
          fi
          # Создаем папку build если её нет
          mkdir -p build
          if [ ! -f build/index.html ]; then 
            cat > build/index.html << 'EOF'
  <!DOCTYPE html>
  <html lang="ru">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Aura Messenger</title>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0A0A0F; color: white; }
#root { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.loading { text-align: center; }
.loading .logo { width: 80px; height: 80px; background: linear-gradient(135deg, #FF3B30, #FF6B5E); border-radius: 24px; margin: 0 auto 20px; animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
.loading h1 { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
.loading p { color: #8E8E93; font-size: 14px; }
  </style>
  </head>
  <body>
  <div id="root">
  <div class="loading">
  <div class="logo"></div>
  <h1>AURA</h1>
  <p>Загрузка мессенджера...</p>
  </div>
  </div>
  </body>
  </html>
  EOF
  fi

- name: Install Capacitor and Plugins
  run: |
    # Устанавливаем Capacitor CLI и Core
    npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --save-dev
    
    # Устанавливаем все необходимые плагины
    npm install @capacitor/app@5 --save-dev
    npm install @capacitor/haptics@5 --save-dev
    npm install @capacitor/keyboard@5 --save-dev
    npm install @capacitor/status-bar@5 --save-dev
    npm install @capacitor/splash-screen@5 --save-dev
    npm install @capacitor/filesystem@5 --save-dev
    npm install @capacitor/storage@5 --save-dev
    
    # Проверяем установку
    echo "✅ Capacitor and plugins installed"
    ls -la node_modules/@capacitor/

- name: Create Capacitor Config
  run: |
    # Создаем конфигурацию Capacitor
    cat <<EOF > capacitor.config.json
    {
      "appId": "com.aura.app",
      "appName": "Aura",
      "webDir": "build",
      "bundledWebRuntime": false,
      "server": {
        "androidScheme": "https"
      },
      "ios": {
        "contentInset": "always",
        "backgroundColor": "#000000"
      },
      "plugins": {
        "SplashScreen": {
          "launchShowDuration": 2000,
          "launchAutoHide": true,
          "backgroundColor": "#000000",
          "androidSplashResourceName": "splash",
          "androidScaleType": "CENTER_CROP",
          "showSpinner": false,
          "iosSpinnerStyle": "small",
          "spinnerColor": "#FF3B30"
        }
      }
    }
    EOF
    
    echo "✅ Capacitor config created"
    cat capacitor.config.json

- name: Add iOS Platform
  run: |
    # Удаляем старую папку ios если есть
    rm -rf ios
    
    # Добавляем iOS платформу
    npx cap add ios
    
    # Синхронизируем веб-код
    npx cap sync ios
    
    echo "✅ iOS platform added"

- name: Create Podfile with All Plugins
  run: |
    cd ios/App
    
    # Создаем Podfile со всеми плагинами
    cat <<EOF > Podfile
    platform :ios, '13.0'
    use_frameworks! :linkage => :static
    
    def capacitor_pods
      pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
      pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
      pod 'CapacitorHaptics', :path => '../../node_modules/@capacitor/haptics'
      pod 'CapacitorKeyboard', :path => '../../node_modules/@capacitor/keyboard'
      pod 'CapacitorStatusBar', :path => '../../node_modules/@capacitor/status-bar'
      pod 'CapacitorSplashScreen', :path => '../../node_modules/@capacitor/splash-screen'
      pod 'CapacitorFilesystem', :path => '../../node_modules/@capacitor/filesystem'
      pod 'CapacitorStorage', :path => '../../node_modules/@capacitor/storage'
    end
    
    target 'App' do
      capacitor_pods
    
      post_install do |installer|
        installer.pods_project.targets.each do |target|
          target.build_configurations.each do |config|
            config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
            config.build_settings['ENABLE_BITCODE'] = 'NO'
          end
        end
      end
    end
    EOF
    
    echo "✅ Podfile created"
    cat Podfile

- name: Install CocoaPods Dependencies
  run: |
    cd ios/App
    pod install --repo-update
    echo "✅ CocoaPods installed"

- name: Configure Info.plist
  run: |
    cd ios/App/App
    
    # Добавляем все необходимые разрешения
    /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Aura needs microphone for voice messages and calls'" Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Aura needs camera for video calls and photos'" Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Aura needs photo library access to share images'" Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Aura needs permission to save photos'" Info.plist 2>/dev/null || true
    
    # Настройка App Transport Security
    /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" Info.plist 2>/dev/null || true
    
    # Фоновые режимы для звонков
    /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string voip" Info.plist 2>/dev/null || true
    
    # Настройка внешнего вида
    /usr/libexec/PlistBuddy -c "Add :UIViewControllerBasedStatusBarAppearance bool false" Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Add :UIStatusBarStyle string UIStatusBarStyleLightContent" Info.plist 2>/dev/null || true
    
    echo "✅ Info.plist configured"

- name: Update iOS Project Settings
  run: |
    cd ios/App
    
    # Обновляем настройки проекта
    /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Aura" App/Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Set :CFBundleName Aura" App/Info.plist 2>/dev/null || true
    
    # Добавляем иконки в Info.plist
    /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" App/Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" App/Info.plist 2>/dev/null || true
    /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" App/Info.plist 2>/dev/null || true
    
    echo "✅ Project settings updated"

- name: Build iOS App (Unsigned)
  run: |
    cd ios/App
    
    # Собираем приложение
    xcodebuild -workspace App.xcworkspace \
      -scheme App \
      -configuration Release \
      -sdk iphoneos \
      -derivedDataPath build \
      CODE_SIGN_IDENTITY="" \
      CODE_SIGNING_REQUIRED=NO \
      CODE_SIGNING_ALLOWED=NO \
      DEVELOPMENT_TEAM="" \
      PROVISIONING_PROFILE_SPECIFIER="" \
      clean build
    
    echo "✅ Build completed"

- name: Create IPA File
  run: |
    cd ios/App
    
    # Ищем собранный .app файл
    APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
    
    if [ -z "$APP_PATH" ]; then
      echo "❌ Error: App not found!"
      echo "Searching in build folder..."
      find build -name "*.app"
      exit 1
    fi
    
    echo "✅ Found app at: $APP_PATH"
    
    # Создаем IPA
    mkdir -p Payload
    cp -R "$APP_PATH" Payload/
    zip -qr Aura-App.ipa Payload
    
    # Перемещаем IPA в корень
    mv Aura-App.ipa ../../../
    
    echo "✅ IPA created successfully"
    ls -la ../../../Aura-App.ipa

- name: Create Simulator Build (Optional)
  run: |
    cd ios/App
    
    # Собираем для симулятора
    xcodebuild -workspace App.xcworkspace \
      -scheme App \
      -configuration Debug \
      -sdk iphonesimulator \
      -derivedDataPath sim-build \
      CODE_SIGN_IDENTITY="" \
      CODE_SIGNING_REQUIRED=NO \
      clean build
    
    # Находим .app для симулятора
    SIM_APP_PATH=$(find sim-build/Build/Products/Debug-iphonesimulator -name "*.app" | head -n 1)
    
    if [ -n "$SIM_APP_PATH" ]; then
      zip -qr Aura-Simulator.app.zip "$SIM_APP_PATH"
      mv Aura-Simulator.app.zip ../../
      echo "✅ Simulator build created"
    fi

- name: Upload IPA Artifact
  uses: actions/upload-artifact@v4
  with:
    name: Aura-iOS
    path: Aura-App.ipa
    compression-level: 0

- name: Upload Simulator Build (Optional)
  uses: actions/upload-artifact@v4
  with:
    name: Aura-iOS-Simulator
    path: Aura-Simulator.app.zip
    if-no-files-found: ignore